spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_expense
    username: hyniva-user
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework.security: INFO

# JWT configuration placeholder
jwt:
  secret: change-me-secret-key
  expiration-ms: 3600000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
