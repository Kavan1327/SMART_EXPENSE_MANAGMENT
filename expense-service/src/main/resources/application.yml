spring:
  application:
    name: expense-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_expense
    username: hyniva-user
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  cache:
    type: redis

  data:
    redis:
      host: localhost   # ✅ FIXED
      port: 6379

kafka:
  bootstrap-servers: localhost:9092
  topic:
    expense-created: expense-created
    budget-exceeded: budget-exceeded

server:
  port: 8082

logging:
  level:
    root: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173